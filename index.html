<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Spacewestern</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        /* Square: use the smaller of viewport width/height */
        width: min(100vw, 100vh);
        height: min(100vw, 100vh);
      }
    </style>
  </head>
  <body>
    <canvas id="rayworld-canvas" data-raw-handle></canvas>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <script>
      const canvas = document.getElementById('rayworld-canvas');
      // Cap at 1x DPR — the raytracer is expensive per-pixel and the
      // block art style doesn't benefit from retina resolution.
      const size = Math.min(window.innerWidth, window.innerHeight);
      canvas.width = size;
      canvas.height = size;
    </script>
  </body>
</html>
