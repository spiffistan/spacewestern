<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Rayworld</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <canvas id="rayworld-canvas" data-raw-handle></canvas>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <script>
      // Set canvas pixel dimensions to match the actual display size
      const canvas = document.getElementById('rayworld-canvas');
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
    </script>
  </body>
</html>
