<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Spacewestern</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        /* Square: use the smaller of viewport width/height */
        width: min(100vw, 100vh);
        height: min(100vw, 100vh);
      }
    </style>
  </head>
  <body>
    <canvas id="rayworld-canvas" data-raw-handle></canvas>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <script>
      const canvas = document.getElementById('rayworld-canvas');
      const dpr = window.devicePixelRatio || 1;
      const size = Math.min(window.innerWidth, window.innerHeight);
      canvas.width = size * dpr;
      canvas.height = size * dpr;
    </script>
  </body>
</html>
